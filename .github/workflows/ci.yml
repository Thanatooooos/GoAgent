name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend lint
        run: make lint

      - name: Backend unit tests
        run: make test-go

      - name: Frontend build
        run: make build

  integration:
    runs-on: ubuntu-latest
    needs: build-and-unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Start integration dependencies
        run: docker compose up -d postgres object-storage object-storage-init

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if [ "$(docker inspect -f '{{.State.Health.Status}}' goagent-postgres)" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs postgres
          exit 1

      - name: Wait for object storage
        run: |
          for i in $(seq 1 30); do
            if [ "$(docker inspect -f '{{.State.Health.Status}}' goagent-object-storage)" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs object-storage
          exit 1

      - name: Wait for object storage init
        run: |
          for i in $(seq 1 30); do
            status="$(docker inspect -f '{{.State.Status}}' goagent-object-storage-init)"
            code="$(docker inspect -f '{{.State.ExitCode}}' goagent-object-storage-init 2>/dev/null || echo 1)"
            if [ "$status" = "exited" ] && [ "$code" = "0" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs object-storage-init
          exit 1

      - name: Run integration tests
        run: make test-integration

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop integration dependencies
        if: always()
        run: docker compose down -v
