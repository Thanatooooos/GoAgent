services:
  postgres:
    image: paradedb/paradedb:pg16
    container_name: goagent-postgres
    environment:
      POSTGRES_DB: ragent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_search
      - -c
      - pg_search.maintenance_work_mem=64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: goagent-redis
    command: ["redis-server", "--requirepass", "123456"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  object-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: goagent-object-storage
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: rustfsadmin
      MINIO_ROOT_PASSWORD: rustfsadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - object-storage-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  object-storage-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: goagent-object-storage-init
    depends_on:
      object-storage:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://object-storage:9000 rustfsadmin rustfsadmin &&
        mc mb --ignore-existing local/knowledge
    restart: "no"

  tika:
    image: apache/tika:2.9.2.1
    container_name: goagent-tika
    ports:
      - "9998:9998"
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -lc "exec 3<>/dev/tcp/127.0.0.1/9998;
          printf 'GET /version HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3;
          head -n 1 <&3 | grep -q '200'"
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  object-storage-data:
