server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: ""
    password: ""
    url: jdbc:postgresql://127.0.0.1:5432/ragent?client_encoding=UTF8
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ""

milvus:
  uri: http://localhost:19530

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1536
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  agent:
    max-iterations: 3
    parallel-tool-calls:
      enabled: true
      max-concurrency: 3

  retrieve:
    parallel-subquestions:
      enabled: true
      max-concurrency: 2

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30
    long-message:
      enabled: true
      direct-context-max-tokens: 3000
      chunk-summary-threshold-tokens: 12000
      large-chunk-target-tokens: 3000
      large-chunk-overlap-tokens: 300
      medium-summary-max-chars: 600
      chunk-summary-max-chars: 240
      large-summary-max-chars: 900
    session-recall:
      enabled: true
      max-excerpts: 3
      max-chunks-per-message: 2
      excerpt-target-tokens: 500
      excerpt-overlap-tokens: 50
      max-prompt-tokens: 1500
    explicit-recall:
      max-items: 6
      max-context-chars: 1600
      max-candidates-per-scope: 24
    cache:
      enabled: false
      request-scope-enabled: true
      conversation-scope-enabled: true
      session-recall-enabled: true
      request-max-entries: 128
      conversation-max-entries: 1000
      conversation-ttl-seconds: 600
      empty-session-ttl-seconds: 30
      metrics-enabled: true
      redis-key-prefix: goagent
      embedding-ttl-seconds: 1800
      rule-ttl-seconds: 600
      fact-ttl-seconds: 180
      empty-fact-ttl-seconds: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      run-timeout-ms: 30000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60
    ingestion:
      max-concurrent: 8
      max-retries: 2
      retry-backoff-ms: 1000

  mcp:
    servers:
      tavily:
        enabled: false
        transport: stdio
        command: npx
        args:
          - -y
          - tavily-mcp
        env: {}
        startup-timeout-ms: 10000
        call-timeout-ms: 15000

  search:
    web-search:
      provider: tavily-mcp      # "duckduckgo", "tavily", or "tavily-mcp"
      fallback-provider: tavily # optional fallback when the primary provider fails
      api-key: ""       # inject via environment or local override; do not commit real secrets
      mcp:
        server: tavily
        search-tool: tavily-search
      source-policy:
        allow-domains:
          - go.dev
          - pkg.go.dev
          - golang.org
          - docs.github.com
        deny-domains:
          - quora.com
          - pinterest.com
        allow-suffixes:
          - .gov
          - .edu
        deny-suffixes: []
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2
      keyword:
        enabled-fallback-trgm: true
      metadata-title:
        enabled-fallback-trgm: true
        section-weight: 3.0
        document-name-weight: 1.4
        source-file-name-weight: 1.8

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ""
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ""
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: qwen3-max
    deep-thinking-model: qwen3-max
    candidates:
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        priority: 1
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        priority: 3
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 0
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        priority: 2

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: ${rag.default.dimension}
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: ${rag.default.dimension}
        priority: 2

  rerank:
    default-model: qwen3-rerank
    candidates:
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        priority: 1
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

parser:
  tika:
    url: http://localhost:9998/tika
    timeout-ms: 30000

rustfs:
  url: http://localhost:9000
  access-key-id: ""
  secret-access-key: ""
  bucket: knowledge

feishu:
  app-id: ""
  app-secret: ""

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false
